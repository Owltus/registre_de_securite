name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/registre.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extraire la version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Preparer les fichiers de release
        id: prepare
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p release

          copy_artifact() {
            local dest="$1"; shift
            local src
            src=$(find artifacts "$@" | head -1)
            [ -n "$src" ] && cp "$src" "release/$dest"
          }

          copy_artifact "registre-${VERSION}-setup.exe" -name "*.exe" -path "*/nsis/*"
          copy_artifact "registre.exe"                  -name "registre.exe" -not -path "*/bundle/*"
          copy_artifact "registre-${VERSION}.dmg"       -name "*.dmg"
          copy_artifact "registre-${VERSION}.deb"       -name "*.deb"
          copy_artifact "registre-${VERSION}.AppImage"  -name "*.AppImage"

          ls -la release/

      - name: Generer les notes de release
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"

          # Trouver le tag precedent
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="$CURRENT_TAG"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          fi

          echo "DEBUG: CURRENT_TAG=$CURRENT_TAG PREV_TAG=$PREV_TAG"
          echo "DEBUG: RANGE=$RANGE"
          echo "DEBUG: commits found=$(git log "$RANGE" --oneline --no-merges | wc -l)"

          # Parser les commits par categorie (|| true evite l'echec si grep ne matche rien)
          FEATS=$(git log "$RANGE" --pretty=format:"%s" --no-merges | grep "^feat" | sed 's/^[a-z]*([^)]*): //' | sed 's/^[a-z]*: //' | sed 's/^./\U&/' || true)
          FIXES=$(git log "$RANGE" --pretty=format:"%s" --no-merges | grep "^fix" | sed 's/^[a-z]*([^)]*): //' | sed 's/^[a-z]*: //' | sed 's/^./\U&/' || true)
          OTHERS=$(git log "$RANGE" --pretty=format:"%s" --no-merges | grep -v "^feat" | grep -v "^fix" | grep -v "^build: release" | grep -v "^chore: release" | sed 's/^[a-z]*([^)]*): //' | sed 's/^[a-z]*: //' | sed 's/^./\U&/' || true)

          echo "DEBUG: FEATS='$FEATS'"
          echo "DEBUG: FIXES='$FIXES'"
          echo "DEBUG: OTHERS='$OTHERS'"

          # Construire le body
          REPO="${{ github.repository }}"
          cat > release-notes.md <<EOF
# Registre

## Telecharger

### Windows

- [registre-${VERSION}-setup.exe](https://github.com/${REPO}/releases/download/v${VERSION}/registre-${VERSION}-setup.exe) — Installeur
- [registre.exe](https://github.com/${REPO}/releases/download/v${VERSION}/registre.exe) — Portable (sans installation)

### macOS

- [registre-${VERSION}.dmg](https://github.com/${REPO}/releases/download/v${VERSION}/registre-${VERSION}.dmg) — Installeur

### Linux

- [registre-${VERSION}.deb](https://github.com/${REPO}/releases/download/v${VERSION}/registre-${VERSION}.deb) — Debian / Ubuntu
- [registre-${VERSION}.AppImage](https://github.com/${REPO}/releases/download/v${VERSION}/registre-${VERSION}.AppImage) — Toutes distributions

---

## Notes de mise a jour
EOF

          if [ -n "$FEATS" ]; then
            printf "\n### Nouveautes\n\n" >> release-notes.md
            echo "$FEATS" | sed 's/^/- /' >> release-notes.md
          fi

          if [ -n "$FIXES" ]; then
            printf "\n### Corrections\n\n" >> release-notes.md
            echo "$FIXES" | sed 's/^/- /' >> release-notes.md
          fi

          if [ -n "$OTHERS" ]; then
            printf "\n### Ameliorations\n\n" >> release-notes.md
            echo "$OTHERS" | sed 's/^/- /' >> release-notes.md
          fi

          cat release-notes.md

      - name: Creer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "Registre v${{ steps.version.outputs.VERSION }}"
          body_path: release-notes.md
          files: release/*
          draft: false
          prerelease: false
