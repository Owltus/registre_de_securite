name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: src-tauri/target/x86_64-pc-windows-msvc/release/registre.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extraire la version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: artifacts

      - name: Preparer les fichiers de release
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p release

          PORTABLE=$(find artifacts -name "registre.exe" | head -1)
          [ -n "$PORTABLE" ] && cp "$PORTABLE" "release/registre.exe"

          ls -la release/

      - name: Generer les notes de release
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"

          # Trouver le tag precedent
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="$CURRENT_TAG"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          fi

          # Recuperer les commits (sans les releases)
          HASHES=$(git log "$RANGE" --pretty=format:"%h" --no-merges | while read h; do
            subject=$(git log -1 --pretty=format:"%s" "$h")
            echo "$subject" | grep -qE "^(build|chore): release" && continue
            echo "$h"
          done)

          COMMIT_COUNT=$(echo "$HASHES" | grep -c . || echo "0")
          PREV_VERSION="${PREV_TAG#v}"

          # Construire le header
          REPO="${{ github.repository }}"
          DL="https://github.com/${REPO}/releases/download/v${VERSION}"
          {
            echo "### Telechargement"
            echo ""
            echo "- [registre.exe](${DL}/registre.exe)"
            echo ""
            echo "### Changelog"
            echo ""
            echo "> ${COMMIT_COUNT} modifications depuis la version ${PREV_VERSION:-initiale}"
          } > release-notes.md

          # Generer le detail de chaque commit
          if [ -n "$HASHES" ]; then
            echo "$HASHES" | while read h; do
              SUBJECT=$(git log -1 --pretty=format:"%s" "$h")
              BODY=$(git log -1 --pretty=format:"%b" "$h")
              DATE=$(git log -1 --pretty=format:"%ad" --date=format:"%d/%m/%Y" "$h")

              # Extraire le type (feat, fix, refactor...)
              TYPE=$(echo "$SUBJECT" | sed -n 's/^\([a-z]*\).*/\1/p')

              # Nettoyer le titre : retirer le prefixe conventionnel
              TITLE=$(echo "$SUBJECT" | sed 's/^[a-z]*([^)]*): //' | sed 's/^[a-z]*: //' | sed 's/^./\U&/')

              {
                echo ""
                echo "---"
                echo ""
                echo "#### ${TITLE}"
                echo ""
                echo "\`${h}\` — ${TYPE} — ${DATE}"
                echo ""
              } >> release-notes.md

              if [ -n "$BODY" ]; then
                # Premiere ligne du body = resume
                SUMMARY=$(echo "$BODY" | head -1)
                # Le reste = detail
                DETAIL=$(echo "$BODY" | tail -n +2)

                echo "${SUMMARY}" >> release-notes.md

                if [ -n "$(echo "$DETAIL" | tr -d '[:space:]')" ]; then
                  {
                    echo ""
                    echo "<details>"
                    echo "<summary>Voir le detail</summary>"
                    echo ""
                    echo "$DETAIL"
                    echo ""
                    echo "</details>"
                  } >> release-notes.md
                fi
              fi
            done
          else
            echo "" >> release-notes.md
            echo "_Aucune modification notable._" >> release-notes.md
          fi

          cat release-notes.md

      - name: Creer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "Registre v${{ steps.version.outputs.VERSION }}"
          body_path: release-notes.md
          files: release/*
          draft: false
          prerelease: false
